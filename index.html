<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이미지 필터 생성기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0c0c;--sf:#161616;--sf2:#1e1e1e;--bd:#2a2a2a;--bdh:#3a3a3a;--tx:#e4e4e4;--txd:#777;--txf:#4a4a4a;--g:#5e7e4f;--gl:#7fa86a;--gbg:rgba(94,126,79,.08);--gld:#c2a878;--gldbg:rgba(194,168,120,.08);--rd:#a85a5a;--r:10px}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;line-height:1.6}
.hdr{padding:44px 20px 32px;text-align:center;border-bottom:1px solid var(--bd)}.hdr h1{font-family:'Playfair Display',serif;font-size:2.1rem;letter-spacing:-1px;margin-bottom:4px}.hdr h1 em{font-style:normal;color:var(--gl)}.hdr p{color:var(--txd);font-size:.8rem;font-weight:300}
.wrap{max-width:940px;margin:0 auto;padding:28px 20px 80px}
.step{margin-bottom:24px}.slbl{display:inline-flex;align-items:center;gap:8px;font-size:.76rem;font-weight:600;color:var(--gl);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}.sn{width:22px;height:22px;border-radius:50%;background:var(--g);color:#fff;font-size:.68rem;display:flex;align-items:center;justify-content:center;font-weight:700}
.cd{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:18px}
.stitle{font-size:.73rem;font-weight:600;color:var(--gl);margin-bottom:8px}
.ssep{margin:14px 0 0;padding-top:14px;border-top:1px solid var(--bd)}
.tbar{display:flex;gap:0;margin-bottom:12px;border-radius:8px;overflow:hidden;border:1px solid var(--bd)}.tb{flex:1;padding:8px;background:var(--sf2);border:none;color:var(--txd);font-family:'Noto Sans KR',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .2s}.tb:not(:last-child){border-right:1px solid var(--bd)}.tb.on{background:var(--g);color:#fff}
.tc{display:none}.tc.on{display:block}
textarea{width:100%;min-height:100px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:10px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:.76rem;line-height:1.5;resize:vertical;outline:none}textarea:focus{border-color:var(--g)}textarea::placeholder{color:#444}
.ht{margin-top:6px;font-size:.7rem;color:var(--txd)}.ht code{background:var(--sf2);padding:1px 4px;border-radius:3px;font-family:'JetBrains Mono',monospace;font-size:.66rem}
.dz{border:2px dashed var(--bd);border-radius:10px;padding:32px 16px;text-align:center;cursor:pointer;transition:all .3s;position:relative;font-size:.82rem;color:var(--txd)}.dz:hover,.dz.ov{border-color:var(--g);background:var(--gbg)}.dz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.thl{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}.thi{position:relative;width:72px;height:72px;border-radius:6px;overflow:hidden;border:1px solid var(--bd)}.thi img{width:100%;height:100%;object-fit:cover}.thrm{position:absolute;top:2px;right:2px;width:16px;height:16px;background:rgba(0,0,0,.7);border:none;border-radius:50%;color:#fff;font-size:.58rem;cursor:pointer;display:flex;align-items:center;justify-content:center}.thrm:hover{background:var(--rd)}.tho{position:absolute;bottom:2px;left:2px;background:rgba(0,0,0,.7);color:#fff;font-size:.55rem;padding:1px 4px;border-radius:3px}
.ib{margin-top:8px;padding:8px 10px;border-radius:8px;font-size:.72rem;line-height:1.4;display:none}.ib.sh{display:block}.ib.gld{background:var(--gldbg);border:1px solid rgba(194,168,120,.2);color:var(--gld)}.ib.grn{background:var(--gbg);border:1px solid rgba(94,126,79,.25);color:var(--gl)}
.og label{display:block;font-size:.7rem;color:var(--txd);margin-bottom:4px;font-weight:500}.og input,.og select{width:100%;padding:8px 10px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-family:'Noto Sans KR',sans-serif;font-size:.82rem;outline:none}.og input:focus,.og select:focus{border-color:var(--g)}.og select option{background:var(--sf)}
.opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:8px;margin-top:10px}
.rr{display:flex;align-items:center;gap:8px;margin-top:4px}.rr input[type=range]{flex:1;accent-color:var(--g)}.rv{min-width:40px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:.76rem;color:var(--gl)}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:5px;margin-top:8px}
.ci{display:flex;align-items:center;gap:7px;padding:7px 9px;background:var(--sf2);border:1px solid var(--bd);border-radius:7px;cursor:pointer;transition:all .15s;font-size:.76rem;user-select:none}.ci:hover{border-color:var(--bdh)}.ci.on{border-color:var(--g);background:var(--gbg)}.ci input[type=checkbox]{display:none}.cdot{width:13px;height:13px;border-radius:3px;border:2px solid var(--bd);transition:all .15s;flex-shrink:0}.ci.on .cdot{background:var(--g);border-color:var(--g)}
.fxs{margin-top:10px;display:none}.fxs.sh{display:block}
.fr{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}.fr .fn{min-width:72px;font-size:.71rem;color:var(--txd)}.fr input[type=range]{flex:1;accent-color:var(--g);min-width:70px}.fr .fv{min-width:42px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--tx)}.fr input[type=color]{width:30px;height:26px;border:1px solid var(--bd);border-radius:5px;background:var(--sf2);cursor:pointer;padding:2px}
.img-card{margin-bottom:12px;border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.img-card-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--sf2);cursor:pointer;user-select:none}
.img-card-hdr .img-thumb{width:44px;height:44px;border-radius:5px;object-fit:cover;border:1px solid var(--bd);flex-shrink:0}
.img-card-hdr .img-label{font-size:.8rem;font-weight:600;color:var(--gl);flex:1}
.img-card-hdr .img-toggle{font-size:.65rem;color:var(--txd)}
.img-card-body{display:none;padding:14px;background:var(--sf)}.img-card-body.open{display:block}
.img-sec{margin-top:10px;padding:10px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px}
.img-sec-t{font-size:.7rem;font-weight:600;color:var(--gld);margin-bottom:6px}
.mini-select{padding:6px 8px;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:.77rem;outline:none;width:100%}.mini-select:focus{border-color:var(--g)}
.mini-opts{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:5px;margin-top:5px}
.gbtn{display:block;width:100%;padding:13px;margin-top:18px;background:var(--g);color:#fff;border:none;border-radius:var(--r);font-size:.92rem;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:background .2s,transform .1s}.gbtn:hover{background:var(--gl)}.gbtn:active{transform:scale(.98)}
.sbtn{padding:7px 14px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:.76rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s}.sbtn:hover{border-color:var(--g);color:var(--gl)}
.res{display:none;margin-top:28px}.res.sh{display:block}.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.rt{font-size:.86rem;font-weight:600}
.cpb{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:.76rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s}.cpb:hover{border-color:var(--g);color:var(--gl)}.cpb.ok{border-color:var(--g);color:var(--gl)}
.cbox{background:var(--sf);border:1px solid var(--bd);border-radius:12px;overflow:hidden}.cbox pre{padding:16px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:.7rem;line-height:1.6;color:#bbb;white-space:pre;max-height:400px;overflow-y:auto}
.pvs{margin-top:18px;display:none}.pvs.sh{display:block}.pvl{font-size:.76rem;color:var(--txd);margin-bottom:6px;font-weight:500}.pvf{background:#fff;border-radius:12px;padding:50px 30px;overflow:visible;min-height:80px}
.preset-row{display:flex;align-items:center;gap:6px;padding:10px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:10px;margin-bottom:14px;flex-wrap:wrap;min-height:40px}
.preset-row .pr-label{font-size:.72rem;color:var(--gld);font-weight:600;white-space:nowrap}
.preset-row .pr-chips{display:flex;gap:4px;flex-wrap:wrap;flex:1;min-width:0}
.preset-chip{padding:4px 10px;background:var(--sf2);border:1px solid var(--bd);border-radius:16px;font-size:.7rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px;white-space:nowrap}.preset-chip:hover{border-color:var(--g);color:var(--gl)}
.preset-chip .pdel{color:var(--txf);font-size:.55rem;cursor:pointer}.preset-chip .pdel:hover{color:var(--rd)}
.pr-actions{display:flex;gap:4px;margin-left:auto}
.pr-btn{padding:4px 8px;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;color:var(--txd);font-size:.65rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}.pr-btn:hover{border-color:var(--g);color:var(--gl)}
.hidden-input{position:absolute;width:0;height:0;opacity:0;overflow:hidden}
@media(max-width:600px){.hdr h1{font-size:1.6rem}.opts{grid-template-columns:1fr}.cg{grid-template-columns:repeat(2,1fr)}.thi{width:60px;height:60px}}
</style>
</head>
<body>
<div class="hdr"><h1>이미지 <em>필터</em> 생성기</h1></div>
<div class="wrap">

<!-- 네비게이션 -->
<div style="display:flex;gap:0;margin-bottom:24px;border-radius:var(--r);overflow:hidden;border:1px solid var(--bd)">
<a href="index.html" style="flex:1;padding:11px;background:var(--g);color:#fff;text-decoration:none;font-size:.82rem;font-weight:600;text-align:center;border-right:1px solid var(--bd)">✨ 필터 & 효과</a>
<a href="transition.html" style="flex:1;padding:11px;background:var(--sf2);color:var(--txd);text-decoration:none;font-size:.82rem;font-weight:500;text-align:center;border-right:1px solid var(--bd)">🔄 이미지 전환</a>
<a href="scroll.html" style="flex:1;padding:11px;background:var(--sf2);color:var(--txd);text-decoration:none;font-size:.82rem;font-weight:500;text-align:center">🎠 무한 스크롤</a>
</div>

<div id="panel-fx">
</div>

<!-- 1. 이미지 -->
<div class="step"><div class="slbl"><div class="sn">1</div>이미지</div>
<div class="cd">
<div class="tbar"><button class="tb on" id="tab-paste-btn">URL 붙여넣기</button><button class="tb" id="tab-upload-btn">직접 올리기</button></div>
<div class="tc on" id="tab-paste"><textarea id="txt-input" placeholder="이미지 URL 또는 <p><img src=...> 코드"></textarea><div class="ht"><code>&lt;p&gt;&lt;img&gt;</code> 또는 URL 한 줄씩</div></div>
<div class="tc" id="tab-upload"><div class="dz" id="dropzone">📁 드래그 또는 클릭<input type="file" id="file-input" multiple accept="image/*"></div><div class="thl" id="thl"></div><div class="ib gld" id="up-note">⚠️ 미리보기 전용. src를 실제 URL로 교체하세요.</div><div class="ib grn" id="ratio-hint"></div></div>
</div></div>

<!-- 2. 크기 -->
<div class="step"><div class="slbl"><div class="sn">2</div>크기</div>
<div class="cd">
<div class="opts">
<div class="og"><label>가로(px)</label><input type="number" id="opt-w" value="280" min="50"></div>
<div class="og"><label>세로(px)</label><input type="number" id="opt-h" value="180" min="50"></div>
<div class="og"><label>둥글기(px)</label><input type="number" id="opt-rad" value="8" min="0"></div>
<div class="og"><label>간격(px)</label><input type="number" id="opt-gap" value="15" min="0"></div>
</div>
<div id="ratio-ctrl" style="margin-top:12px;display:none"><label style="font-size:.7rem;color:var(--txd)">세로 비율</label><div class="rr"><span style="font-size:.68rem;color:var(--txf)">50%</span><input type="range" id="ratio-sl" min="50" max="200" value="100"><span style="font-size:.68rem;color:var(--txf)">200%</span><div class="rv" id="ratio-val">100%</div></div></div>
</div></div>

<!-- 3. 모드 -->
<div class="step"><div class="slbl"><div class="sn">3</div>적용 방식</div>
<div class="cd"><div class="opts" style="margin-top:0"><div class="og"><label>모드</label>
<select id="fx-mode"><option value="all">전체 동일</option><option value="wave">파도 타이밍</option><option value="each">이미지별 개별</option></select></div></div></div></div>

<!-- 4. 공통 패널 -->
<div id="common-panel">
<div class="step"><div class="slbl"><div class="sn">4</div>효과</div>
<div class="cd">
<div class="stitle">🎨 기본 필터</div>
<div class="cg" id="fb-grid"></div><div class="fxs" id="fb-sl"></div>
<div class="ssep"><div class="stitle">🖱️ 호버</div></div>
<div class="cg" style="margin-top:0"><label class="ci on" id="hov-tog"><input type="checkbox" checked><div class="cdot"></div>호버 사용</label></div>
<div id="hov-pan">
<div class="cg" id="fh-grid" style="margin-top:6px"></div><div class="fxs" id="fh-sl"></div>
<div class="opts" style="margin-top:8px">
<div class="og"><label>나타남(초)</label><input type="number" id="opt-trin" value="0.4" min="0" max="5" step="0.1"></div>
<div class="og"><label>사라짐(초)</label><input type="number" id="opt-trout" value="0.4" min="0" max="5" step="0.1"></div>
<div class="og"><label>확대</label><input type="number" id="opt-scale" value="1.05" min="1" max="2" step="0.01"></div>
<div class="og"><label>기울기(deg)</label><input type="number" id="opt-tilt" value="0" min="-45" max="45"></div>
</div></div>
<div class="ssep"><div class="stitle">🎬 애니메이션</div></div>
<div class="cg" id="anim-grid"></div>
<div id="anim-sub" style="display:none;margin-top:10px;padding:12px;background:var(--sf2);border:1px solid var(--bd);border-radius:8px"><div id="anim-sub-c"></div></div>
<div id="wave-opts" style="display:none;margin-top:10px"><div class="fr"><span class="fn">딜레이 간격</span><input type="range" id="wave-delay" min="0.1" max="2" value="0.3" step="0.1"><span class="fv">0.3s</span></div></div>
<div class="ssep"><div class="stitle">✨ 특수</div></div>
<div class="cg"><label class="ci" id="sp-vig"><input type="checkbox"><div class="cdot"></div>🔲 비네팅</label><label class="ci" id="sp-gli"><input type="checkbox"><div class="cdot"></div>📺 글리치</label><label class="ci" id="sp-flip"><input type="checkbox"><div class="cdot"></div>🃏 타로 뒤집기</label><label class="ci" id="sp-autofx"><input type="checkbox"><div class="cdot"></div>🔄 자동 필터 전환</label></div>
<div class="fxs" id="sp-sl"></div>
</div></div>
</div>
<div id="each-panel" style="display:none"></div>

<div class="preset-row">
<span class="pr-label">📌 프리셋</span>
<div class="pr-chips" id="plist"></div>
<div class="pr-actions">
<button class="pr-btn" id="save-btn">💾 저장</button>
<button class="pr-btn" id="export-btn">📤</button>
<button class="pr-btn" id="import-btn">📥</button>
<input type="file" id="imp-file" class="hidden-input" accept=".json">
</div></div>

<div class="step"><button class="gbtn" id="gen-btn">코드 생성하기</button></div>
<div class="res" id="result"><div class="rh"><div class="rt">생성된 코드</div><button class="cpb" id="copy-btn">📋 복사</button></div><div class="cbox"><pre id="code-out"></pre></div><div class="pvs" id="pv-sec"><div class="pvl">미리보기</div><div class="pvf" id="pv-frame"></div></div></div>
</div><!-- /panel-fx -->


<script>
(function(){
"use strict";
// ─── Helpers ───
const $=id=>document.getElementById(id);
const V=(id,def)=>{const el=$(id);return el?el.value:(def!=null?String(def):'')};
const isOn=id=>{const el=$(id);return el?.querySelector('input')?.checked||false};
const hexA=(h,a)=>`rgba(${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)},${a})`;
const gcd=(a,b)=>b?gcd(b,a%b):a;
const show=id=>$(id).classList.add('sh');

// ─── Filter defs ───
const FD={grayscale:{n:'흑백',u:'%',mn:0,mx:100,d:100},sepia:{n:'빈티지',u:'%',mn:0,mx:100,d:80},blur:{n:'흐림',u:'px',mn:0,mx:20,d:5},brightness:{n:'밝기',u:'%',mn:0,mx:200,d:50},contrast:{n:'대비',u:'%',mn:50,mx:200,d:150},invert:{n:'반전',u:'%',mn:0,mx:100,d:100},saturate:{n:'채도',u:'%',mn:0,mx:300,d:200},dropshadow:{n:'후광',u:'px',mn:0,mx:30,d:10}};
const FXI=[{k:'grayscale',e:'🖤',l:'흑백'},{k:'sepia',e:'📜',l:'빈티지'},{k:'blur',e:'🌫️',l:'흐림'},{k:'brightness',e:'☀️',l:'밝기'},{k:'contrast',e:'🎛️',l:'대비'},{k:'invert',e:'🔄',l:'반전'},{k:'saturate',e:'🎨',l:'채도'},{k:'dropshadow',e:'✨',l:'후광'}];

// ─── Animation defs ───
const ANIMS=[{k:'floating',e:'🎈',l:'둥둥'},{k:'heartbeat',e:'💓',l:'심장박동'},{k:'shake',e:'🫨',l:'떨기'},{k:'spin',e:'🔄',l:'회전'},{k:'glow',e:'💡',l:'빛나기'},{k:'swing',e:'🎵',l:'흔들흔들'},{k:'bounce',e:'⬆️',l:'통통'},{k:'glitchanim',e:'📺',l:'글리치'}];
const AF={floating:[{id:'af-d',l:'거리(px)',mn:5,mx:50,d:15},{id:'af-s',l:'속도(초)',mn:.5,mx:10,d:3,s:.5}],heartbeat:[{id:'ah-b',l:'배율',mn:1.05,mx:1.5,d:1.15,s:.01},{id:'ah-s',l:'속도(초)',mn:.3,mx:3,d:1,s:.1}],shake:[{id:'as-d',l:'강도(px)',mn:1,mx:20,d:5},{id:'as-s',l:'속도(초)',mn:.1,mx:2,d:.5,s:.1}],spin:[{id:'asp-d',l:'각도',mn:90,mx:720,d:360,s:90},{id:'asp-dir',l:'방향',type:'sel',opts:['시계','반시계']},{id:'asp-s',l:'속도(초)',mn:.2,mx:3,d:.6,s:.1}],glow:[{id:'ag-sz',l:'크기(px)',mn:5,mx:60,d:20},{id:'ag-c',l:'색상',type:'col',d:'#5e7e4f'},{id:'ag-s',l:'속도(초)',mn:.5,mx:5,d:2,s:.5}],swing:[{id:'asw-d',l:'각도',mn:3,mx:30,d:10},{id:'asw-s',l:'속도(초)',mn:.5,mx:5,d:2,s:.5}],bounce:[{id:'ab-d',l:'높이(px)',mn:5,mx:50,d:15},{id:'ab-s',l:'속도(초)',mn:.3,mx:3,d:1,s:.1}],glitchanim:[{id:'agl-d',l:'강도(px)',mn:1,mx:15,d:3},{id:'agl-s',l:'속도(초)',mn:.1,mx:2,d:.3,s:.1}]};

// ─── State ───
let curTab='paste';const files=[];let bnw=0,bnh=0;

// ─── Tab switch ───
$('tab-paste-btn').onclick=()=>{curTab='paste';$('tab-paste-btn').classList.add('on');$('tab-upload-btn').classList.remove('on');$('tab-paste').classList.add('on');$('tab-upload').classList.remove('on')};
$('tab-upload-btn').onclick=()=>{curTab='upload';$('tab-upload-btn').classList.add('on');$('tab-paste-btn').classList.remove('on');$('tab-upload').classList.add('on');$('tab-paste').classList.remove('on')};

// ─── URL extract ───
function eu(s){const u=[];const r=/src=["']([^"']+)["']/g;let m;while((m=r.exec(s))!==null)u.push(m[1]);if(u.length)return[...new Set(u)];return[...new Set(s.split('\n').map(l=>l.trim()).filter(l=>l.startsWith('http')))]}
function getImgs(){if(curTab==='paste')return eu(V('txt-input')).map(u=>({url:u,pv:u}));return files.map((f,i)=>({url:`이미지${i+1}_URL`,pv:f.du}))}

// ─── File upload ───
const dz=$('dropzone'),fi=$('file-input');
dz.ondragover=e=>{e.preventDefault();dz.classList.add('ov')};dz.ondragleave=()=>dz.classList.remove('ov');
dz.ondrop=e=>{e.preventDefault();dz.classList.remove('ov');addF(e.dataTransfer.files)};
fi.onchange=e=>{addF(e.target.files);e.target.value=''};
function addF(fl){let first=!files.length;[...fl].forEach(f=>{if(!f.type.startsWith('image/'))return;const r=new FileReader();r.onload=e=>{const du=e.target.result;const im=new Image();im.onload=()=>{files.push({du,nw:im.naturalWidth,nh:im.naturalHeight});if(first){first=false;bnw=im.naturalWidth;bnh=im.naturalHeight;autoR()}rndTh();$('up-note').classList.add('sh');if(fxM()==='each')buildEach()};im.src=du};r.readAsDataURL(f)})}
function rmF(i){files.splice(i,1);rndTh();if(!files.length){$('up-note').classList.remove('sh');$('ratio-ctrl').style.display='none';$('ratio-hint').classList.remove('sh')}if(fxM()==='each')buildEach()}
window.rmF=rmF; // expose for onclick
function rndTh(){const el=$('thl');el.innerHTML='';files.forEach((f,i)=>{const d=document.createElement('div');d.className='thi';d.innerHTML=`<img src="${f.du}"><button class="thrm" onclick="rmF(${i})">✕</button><div class="tho">${i+1}</div>`;el.appendChild(d)})}
function autoR(){const bw=parseInt(V('opt-w'))||280;$('opt-h').value=Math.round(bw*(bnh/bnw));$('ratio-ctrl').style.display='block';$('ratio-sl').value=100;$('ratio-val').textContent='100%';const g=gcd(bnw,bnh);$('ratio-hint').innerHTML=`📐 ${bnw}×${bnh} (${bnw/g}:${bnh/g})`;$('ratio-hint').classList.add('sh')}
$('ratio-sl').oninput=function(){$('ratio-val').textContent=this.value+'%';if(!bnw)return;$('opt-h').value=Math.round((parseInt(V('opt-w'))||280)*(bnh/bnw)*(this.value/100))};
$('opt-w').oninput=function(){if(!bnw||curTab!=='upload')return;const p=parseInt(V('ratio-sl'))||100;$('opt-h').value=Math.round(+this.value*(bnh/bnw)*(p/100))};
$('txt-input').oninput=()=>{if(fxM()==='each')buildEach()};

function buildFG(gridId){const el=$(gridId);FXI.forEach(f=>{const ci=document.createElement('label');ci.className='ci';ci.dataset.fx=f.k;ci.innerHTML=`<input type="checkbox"><div class="cdot"></div>${f.e} ${f.l}`;ci.onclick=()=>{togCI(ci);rebuildSL(gridId)};el.appendChild(ci)})}
function rebuildSL(gridId){const slId=gridId.replace('grid','sl');const sl=$(slId);sl.innerHTML='';const ch=document.querySelectorAll('#'+gridId+' .ci.on');if(!ch.length){sl.classList.remove('sh');return}sl.classList.add('sh');ch.forEach(ci=>{const k=ci.dataset.fx;const d=FD[k];const row=document.createElement('div');row.className='fr';let ex='';if(k==='dropshadow')ex=`<input type="color" value="#5e7e4f" data-role="color"><input type="range" min="0" max="100" value="80" data-role="alpha" style="max-width:60px"><span class="fv" data-role="alphaval">80%</span>`;row.innerHTML=`<span class="fn">${d.n}</span><input type="range" min="${d.mn}" max="${d.mx}" value="${d.d}" data-fx="${k}"><span class="fv">${d.d}${d.u}</span>${ex}`;row.querySelector('[data-fx]').oninput=function(){this.nextElementSibling.textContent=this.value+d.u};const al=row.querySelector('[data-role=alpha]');if(al)al.oninput=function(){row.querySelector('[data-role=alphaval]').textContent=this.value+'%'};sl.appendChild(row)})}

function readFL(slEl){if(!slEl)return'';const p=[];slEl.querySelectorAll('.fr').forEach(row=>{const sl=row.querySelector('[data-fx]');if(!sl)return;const fx=sl.dataset.fx,v=sl.value;if(fx==='dropshadow'){const c=row.querySelector('[data-role=color]')?.value||'#5e7e4f';const a=(row.querySelector('[data-role=alpha]')?.value||80)/100;p.push(`drop-shadow(0 0 ${v}px ${hexA(c,a)})`)}else if(fx==='blur')p.push(`blur(${v}px)`);else p.push(`${fx}(${v}${FD[fx].u})`)});return p.join(' ')}

// ════════════════════════════
//  ANIM CSS HELPERS
// ════════════════════════════
function animStr(a){const m={floating:`floating ${V('af-s',3)}s ease-in-out infinite`,heartbeat:`heartbeat ${V('ah-s',1)}s ease-in-out infinite`,glow:`glow ${V('ag-s',2)}s ease-in-out infinite`,swing:`swing ${V('asw-s',2)}s ease-in-out infinite`,bounce:`bounce ${V('ab-s',1)}s cubic-bezier(.36,0,.66,1) infinite`,glitchanim:`anim-glitch ${V('agl-s',.3)}s steps(5,end) infinite`,shake:`shake ${V('as-s',.5)}s ease-in-out infinite`,spin:`spin ${V('asp-s',.6)}s linear infinite`};return m[a]||''}
function eAnimStr(a,idx){const m={floating:`floating ${V('eaf-s-'+idx,3)}s ease-in-out infinite`,heartbeat:`heartbeat ${V('eah-s-'+idx,1)}s ease-in-out infinite`,glow:`glow ${V('eag-s-'+idx,2)}s ease-in-out infinite`,swing:`swing ${V('easw-s-'+idx,2)}s ease-in-out infinite`,bounce:`bounce ${V('eab-s-'+idx,1)}s cubic-bezier(.36,0,.66,1) infinite`,glitchanim:`anim-glitch ${V('eagl-s-'+idx,.3)}s steps(5,end) infinite`,shake:`shake ${V('eas-s-'+idx,.5)}s ease-in-out infinite`,spin:`spin ${V('easp-s-'+idx,.6)}s linear infinite`};return m[a]||''}
function animBaseCSS(anims){const p=[];anims.forEach(a=>{if(V(a+'-hov','0')==='1')return;const s=animStr(a);if(s)p.push(s)});return p.length?`animation:${p.join(',')}`:''}
function animHovCSS(anims){const p=[];anims.forEach(a=>{if(V(a+'-hov','0')!=='1')return;const s=animStr(a);if(s){/* infinite → 1 for hover-only */p.push(s.replace(' infinite',''))}});return p.length?`animation:${p.join(',')}`:''}
function eAnimBaseCSS(anims,idx){const p=[];anims.forEach(a=>{if(V('e'+a+'hov-'+idx,'0')==='1')return;const s=eAnimStr(a,idx);if(s)p.push(s)});return p.length?`animation:${p.join(',')}`:''}
function eAnimHovCSS(anims,idx){const p=[];anims.forEach(a=>{if(V('e'+a+'hov-'+idx,'0')!=='1')return;const s=eAnimStr(a,idx);if(s){p.push(s.replace(' infinite',''))}});return p.length?`animation:${p.join(',')}`:''}

function kf(a,pfx){
const vv=(id,d)=>V(pfx?pfx+id:id,d);
if(a==='floating'){const d=vv('af-d',15);return`@keyframes floating{0%{transform:translateY(0)}50%{transform:translateY(-${d}px)}100%{transform:translateY(0)}}`}
if(a==='heartbeat'){const b=vv('ah-b',1.15);return`@keyframes heartbeat{0%{transform:scale(1)}14%{transform:scale(${(b*.96).toFixed(2)})}28%{transform:scale(1)}42%{transform:scale(${b})}70%,100%{transform:scale(1)}}`}
if(a==='shake'){const d=vv('as-d',5);return`@keyframes shake{0%,100%{transform:translateX(0)}10%{transform:translateX(-${d}px)}20%{transform:translateX(${d}px)}30%{transform:translateX(-${d}px)}40%{transform:translateX(${d}px)}50%{transform:translateX(-${Math.round(d*.6)}px)}60%{transform:translateX(${Math.round(d*.6)}px)}70%{transform:translateX(0)}}`}
if(a==='spin'){const deg=vv('asp-d',360),dir=vv('asp-dir',0);return`@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(${dir==='1'?'-':''}${deg}deg)}}`}
if(a==='glow'){const sz=vv('ag-sz',20),col=vv('ag-c','#5e7e4f');return`@keyframes glow{0%,100%{box-shadow:0 0 5px ${hexA(col,.3)}}50%{box-shadow:0 0 ${sz}px ${hexA(col,.8)},0 0 ${sz*2}px ${hexA(col,.4)}}}`}
if(a==='swing'){const d=vv('asw-d',10);return`@keyframes swing{0%{transform:rotate(0)}25%{transform:rotate(${d}deg)}50%{transform:rotate(0)}75%{transform:rotate(-${d}deg)}100%{transform:rotate(0)}}`}
if(a==='bounce'){const d=vv('ab-d',15);return`@keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-${d}px)}50%{transform:translateY(0)}70%{transform:translateY(-${Math.round(d*.4)}px)}85%{transform:translateY(0)}}`}
if(a==='glitchanim'){const d=vv('agl-d',3);return`@keyframes anim-glitch{0%,100%{transform:translate(0)}20%{transform:translate(-${d}px,${Math.round(d*.7)}px)}40%{transform:translate(${d}px,-${Math.round(d*.5)}px)}60%{transform:translate(${Math.round(d*.5)}px,${Math.round(d*.3)}px)}80%{transform:translate(-${Math.round(d*.7)}px,-${Math.round(d*.3)}px)}}`}
return''}

$('gen-btn').onclick=function(){
const imgs=getImgs();if(!imgs.length)return alert('이미지를 넣어주세요.');
const w=V('opt-w'),h=V('opt-h'),rad=V('opt-rad'),gap=V('opt-gap');
const mode=fxM();const doVig=isOn('sp-vig'),doGli=isOn('sp-gli'),doFlip=isOn('sp-flip'),doAutoFx=isOn('sp-autofx');

function build(urls){
let css=`.fx-gallery{display:flex;flex-wrap:wrap;gap:${gap}px;justify-content:center;padding:40px 20px;overflow:visible}\n`;

if(doFlip&&mode!=='each'){const fc=V('tf-c','#2c3e2d'),fb=V('tf-b','#c2a878'),fs=V('tf-s','0.6');
css+=`.fx-flip-card{width:${w}px;height:${h}px;perspective:1000px;cursor:pointer}\n.fx-flip-inner{position:relative;width:100%;height:100%;transition:transform ${fs}s ease-in-out;transform-style:preserve-3d}\n.fx-flip-card:hover .fx-flip-inner{transform:rotateY(180deg)}\n.fx-flip-front,.fx-flip-back{position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:${rad}px;overflow:hidden;box-shadow:0 4px 8px rgba(0,0,0,.3)}\n.fx-flip-front{background:${fc};display:flex;align-items:center;justify-content:center}\n.fx-flip-front::before{content:'';position:absolute;inset:10px;border:2px solid ${hexA(fb,.45)};border-radius:${Math.max(0,rad-4)}px}\n.fx-flip-front::after{content:'\\2726';font-size:2.5rem;color:${hexA(fb,.65)}}\n.fx-flip-back{transform:rotateY(180deg)}\n.fx-flip-back img{width:100%;height:100%;object-fit:cover;display:block}\n`;
return`<style>\n${css}</style>\n\n<div class="fx-gallery">\n${urls.map((u,i)=>`    <div class="fx-flip-card"><div class="fx-flip-inner"><div class="fx-flip-front"></div><div class="fx-flip-back"><img src="${u}" alt="사진${i+1}" style="opacity:1;outline:none;"></div></div></div>`).join('\n')}\n</div>`}

if(mode==='each'){
const usedA=new Set();
css+=`.fx-item{width:${w}px;height:${h}px;border-radius:${rad}px;overflow:visible;position:relative}\n.fx-item img{width:100%;height:100%;object-fit:cover;display:block;box-shadow:0 4px 8px rgba(0,0,0,.3);cursor:pointer;border-radius:${rad}px}\n`;
const cards=document.querySelectorAll('#each-panel .img-card');
urls.forEach((_,i)=>{
const card=cards[i];if(!card)return;const n=i+1;
const secs=card.querySelectorAll('.img-sec');
const baseF=readFL(secs[0]?.querySelector('.fxs'));
const hovOn=secs[1]?.querySelector('.ehtog')?.classList.contains('on');
const hovF=hovOn?readFL(secs[1]?.querySelectorAll('.fxs')[1]||secs[1]?.querySelector('.fxs')):''
const trIn=V('etrin-'+i,'.4'),trOut=V('etrout-'+i,'.4'),scale=V('escale-'+i,'1.05'),tilt=V('etilt-'+i,'0');
const anims=[...card.querySelectorAll('.eanim-cg .ci.on')].map(c=>c.dataset.anim);
anims.forEach(a=>usedA.add(a));
let base=[];
if(baseF)base.push(`filter:${baseF}`);
if(hovOn){const tr=['transform','filter','box-shadow'].map(x=>x+' '+trOut+'s ease-in-out').join(',');base.push(`transition:${tr}`)}
const ab=eAnimBaseCSS(anims,i);if(ab)base.push(ab);
if(base.length)css+=`.fx-item:nth-child(${n}) img{${base.join(';')}}\n`;
if(hovOn){let hov=[];const tr=['transform','filter','box-shadow'].map(x=>x+' '+trIn+'s ease-in-out').join(',');hov.push(`transition:${tr}`);const tf=[];if(scale!=='1'&&scale!=='1.00')tf.push(`scale(${scale})`);if(tilt!=='0')tf.push(`rotate(${tilt}deg)`);if(tf.length)hov.push(`transform:${tf.join(' ')}`);if(hovF)hov.push(`filter:${hovF}`);else if(baseF)hov.push(`filter:none`);hov.push('box-shadow:0 8px 20px rgba(0,0,0,.4);z-index:10');const ah=eAnimHovCSS(anims,i);if(ah)hov.push(ah);css+=`.fx-item:nth-child(${n}) img:hover{${hov.join(';')}}\n`}
});
usedA.forEach(a=>{const k=kf(a,'e');if(k)css+=k+'\n'});// uses default values for keyframes
}else{
const useH=hovTog.classList.contains('on');
const trIn=V('opt-trin','.4'),trOut=V('opt-trout','.4'),scale=V('opt-scale','1.05'),tilt=V('opt-tilt','0');
const baseF=readFL($('fb-sl')),hovF=readFL($('fh-sl'));
const anims=getSelAnims();
css+=`.fx-item{width:${w}px;height:${h}px;border-radius:${rad}px;overflow:${doVig?'hidden':'visible'};position:relative}\n`;
let ic=`width:100%;height:100%;object-fit:cover;display:block;box-shadow:0 4px 8px rgba(0,0,0,.3);cursor:pointer;border-radius:${rad}px`;
if(baseF)ic+=`;filter:${baseF}`;
if(useH){const tr=['transform','filter','box-shadow'].map(p=>p+' '+trOut+'s ease-in-out').join(',');ic+=`;transition:${tr}`}
const ab=animBaseCSS(anims);if(ab)ic+=`;${ab}`;
css+=`.fx-item img{${ic}}\n`;
if(useH){let hov=[];const tr=['transform','filter','box-shadow'].map(p=>p+' '+trIn+'s ease-in-out').join(',');hov.push(`transition:${tr}`);const tf=[];if(scale!=='1'&&scale!=='1.00')tf.push(`scale(${scale})`);if(tilt!=='0')tf.push(`rotate(${tilt}deg)`);if(tf.length)hov.push(`transform:${tf.join(' ')}`);if(hovF)hov.push(`filter:${hovF}`);else if(baseF)hov.push(`filter:none`);hov.push('box-shadow:0 8px 20px rgba(0,0,0,.4);z-index:10');const ah=animHovCSS(anims);if(ah)hov.push(ah);css+=`.fx-item img:hover{${hov.join(';')}}\n`}
if(mode==='wave'){const wd=V('wave-delay','0.3');for(let i=0;i<urls.length;i++)css+=`.fx-item:nth-child(${i+1}) img{animation-delay:${(i*parseFloat(wd)).toFixed(1)}s}\n`}
if(doVig)css+=`.fx-item::after{content:'';position:absolute;inset:0;border-radius:${rad}px;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,${V('vig-s',40)/100}) 100%);pointer-events:none}\n`;
if(doGli){const gs=V('gli-s',5);css+=`@keyframes glitch-fx{0%,100%{clip-path:inset(0);transform:translate(0)}20%{clip-path:inset(${gs*3}% 0 ${gs*5}% 0);transform:translate(-${gs}px,${gs}px)}40%{clip-path:inset(${gs*6}% 0 ${gs}% 0);transform:translate(${gs}px,-${gs}px)}60%{clip-path:inset(${gs*2}% 0 ${gs*4}% 0);transform:translate(${gs}px)}80%{clip-path:inset(${gs*5}% 0 ${gs*2}% 0);transform:translate(-${gs}px)}}\n`}
// 자동 필터 전환
if(doAutoFx){
const startFx=V('afx-start','grayscale'),startV=V('afx-startv','100');
const endFx=V('afx-end','none'),endV=V('afx-endv','0');
const dur=V('afx-dur','5'),delay=V('afx-delay','0');
const repeat=V('afx-repeat','infinite');
const startFilter=startFx==='blur'?`blur(${startV}px)`:`${startFx}(${startV}%)`;
const endFilter=endFx==='none'?'none':endFx==='blur'?`blur(${endV}px)`:`${endFx}(${endV}%)`;
const iterDir=repeat==='alternate'?'infinite;animation-direction:alternate':repeat;
css+=`@keyframes auto-filter-transition {\n    0% { filter: ${startFilter}; }\n    100% { filter: ${endFilter}; }\n}\n`;
css+=`.fx-item img {\n    animation: auto-filter-transition ${dur}s ease-in-out ${delay}s ${iterDir} both;\n}\n`;
}
anims.forEach(a=>{const k=kf(a);if(k)css+=k+'\n'});
}
const html=urls.map((u,i)=>`    <div class="fx-item"><img src="${u}" alt="사진${i+1}" style="opacity:1;outline:none;"></div>`).join('\n');
return`<style>\n${css}</style>\n\n<div class="fx-gallery">\n${html}\n</div>`}

const code=build(imgs.map(i=>i.url)),pc=build(imgs.map(i=>i.pv));
$('code-out').textContent=code;show('result');$('pv-frame').innerHTML=pc;show('pv-sec');
$('result').scrollIntoView({behavior:'smooth',block:'start'});
};

// ════════════════════════════
//  PRESETS
// ════════════════════════════
function getPresets(){try{return JSON.parse(localStorage.getItem('glkku-presets')||'[]')}catch{return[]}}
function saveToLS(list){try{localStorage.setItem('glkku-presets',JSON.stringify(list));return true}catch(e){alert('⚠️ 프리셋 저장 실패: 이 환경에서는 localStorage가 지원되지 않습니다.\nGitHub Pages에 올려서 사용해주세요.\n\nJSON 내보내기로 파일 저장은 가능합니다.');return false}}

function collectSettings(){
const s={w:V('opt-w'),h:V('opt-h'),rad:V('opt-rad'),gap:V('opt-gap'),mode:fxM()};
s.baseFx=[];document.querySelectorAll('#fb-grid .ci.on').forEach(ci=>s.baseFx.push(ci.dataset.fx));
s.baseSliders={};document.querySelectorAll('#fb-sl .fr').forEach(row=>{const sl=row.querySelector('[data-fx]');if(sl)s.baseSliders[sl.dataset.fx]={v:sl.value,color:row.querySelector('[data-role=color]')?.value||'',alpha:row.querySelector('[data-role=alpha]')?.value||''}});
s.hovOn=hovTog.classList.contains('on');
s.hovFx=[];document.querySelectorAll('#fh-grid .ci.on').forEach(ci=>s.hovFx.push(ci.dataset.fx));
s.hovSliders={};document.querySelectorAll('#fh-sl .fr').forEach(row=>{const sl=row.querySelector('[data-fx]');if(sl)s.hovSliders[sl.dataset.fx]={v:sl.value,color:row.querySelector('[data-role=color]')?.value||'',alpha:row.querySelector('[data-role=alpha]')?.value||''}});
s.trIn=V('opt-trin');s.trOut=V('opt-trout');s.scale=V('opt-scale');s.tilt=V('opt-tilt');
s.anims=getSelAnims();
s.animSettings={};s.anims.forEach(a=>{s.animSettings[a]={hov:V(a+'-hov','0')};(AF[a]||[]).forEach(f=>{s.animSettings[a][f.id]=V(f.id,f.d!=null?String(f.d):'0')})});
s.waveDelay=V('wave-delay');
s.vig=isOn('sp-vig');s.vigS=V('vig-s','40');s.gli=isOn('sp-gli');s.gliS=V('gli-s','5');s.gliC=V('gli-c','#ff0000');
s.flip=isOn('sp-flip');s.tfC=V('tf-c','#2c3e2d');s.tfB=V('tf-b','#c2a878');s.tfS=V('tf-s','0.6');
return s}

function applySettings(s){
if(s.w)$('opt-w').value=s.w;if(s.h)$('opt-h').value=s.h;if(s.rad)$('opt-rad').value=s.rad;if(s.gap)$('opt-gap').value=s.gap;
if(s.mode){$('fx-mode').value=s.mode;$('fx-mode').dispatchEvent(new Event('change'))}
document.querySelectorAll('#fb-grid .ci').forEach(ci=>{const on=(s.baseFx||[]).includes(ci.dataset.fx);ci.querySelector('input').checked=on;ci.classList.toggle('on',on)});rebuildSL('fb-grid');
if(s.baseSliders)applySlidersTo('#fb-sl',s.baseSliders);
const hcb=hovTog.querySelector('input');hcb.checked=s.hovOn!==false;hovTog.classList.toggle('on',hcb.checked);hovPan.style.display=hcb.checked?'':'none';
document.querySelectorAll('#fh-grid .ci').forEach(ci=>{const on=(s.hovFx||[]).includes(ci.dataset.fx);ci.querySelector('input').checked=on;ci.classList.toggle('on',on)});rebuildSL('fh-grid');
if(s.hovSliders)applySlidersTo('#fh-sl',s.hovSliders);
if(s.trIn)$('opt-trin').value=s.trIn;if(s.trOut)$('opt-trout').value=s.trOut;
if(s.scale)$('opt-scale').value=s.scale;if(s.tilt)$('opt-tilt').value=s.tilt;
animGrid.querySelectorAll('.ci').forEach(ci=>{const on=(s.anims||[]).includes(ci.dataset.anim);ci.querySelector('input').checked=on;ci.classList.toggle('on',on)});buildAnimSub();
if(s.animSettings){setTimeout(()=>{Object.entries(s.animSettings).forEach(([ak,d])=>{const hovEl=$(ak+'-hov');if(hovEl)hovEl.value=d.hov||'0';Object.entries(d).forEach(([fid,val])=>{if(fid==='hov')return;const el=$(fid);if(el)el.value=val})})},50)}
if(s.waveDelay){const el=$('wave-delay');if(el){el.value=s.waveDelay;el.nextElementSibling.textContent=s.waveDelay+'s'}}
function setTog(id,on){const ci=$(id);ci.querySelector('input').checked=on;ci.classList.toggle('on',on)}
setTog('sp-vig',!!s.vig);setTog('sp-gli',!!s.gli);setTog('sp-flip',!!s.flip);buildSpe();
setTimeout(()=>{if(s.vigS){const el=$('vig-s');if(el){el.value=s.vigS;el.nextElementSibling.textContent=s.vigS+'%'}}if(s.gliS){const el=$('gli-s');if(el){el.value=s.gliS;el.nextElementSibling.textContent=s.gliS+'px'}}if(s.gliC){const el=$('gli-c');if(el)el.value=s.gliC}if(s.tfC){const el=$('tf-c');if(el)el.value=s.tfC}if(s.tfB){const el=$('tf-b');if(el)el.value=s.tfB}if(s.tfS){const el=$('tf-s');if(el){el.value=s.tfS;el.nextElementSibling.textContent=s.tfS+'s'}}},60)}

function applySlidersTo(slSel,data){setTimeout(()=>{Object.entries(data).forEach(([fx,d])=>{const row=[...document.querySelectorAll(slSel+' .fr')].find(r=>r.querySelector(`[data-fx="${fx}"]`));if(!row)return;const sl=row.querySelector('[data-fx]');if(sl){sl.value=d.v;sl.nextElementSibling.textContent=d.v+FD[fx].u}if(d.color){const c=row.querySelector('[data-role=color]');if(c)c.value=d.color}if(d.alpha){const a=row.querySelector('[data-role=alpha]');if(a){a.value=d.alpha;row.querySelector('[data-role=alphaval]').textContent=d.alpha+'%'}}})},30)}

// ── Preset to card (each mode) ──
function applyPresetToCard(idx,pi){
const presets=getPresets();const p=presets[pi];if(!p)return;const s=p.settings;
const card=document.querySelectorAll('#each-panel .img-card')[idx];if(!card)return;
// Base filters
const bGrid=card.querySelectorAll('.efx')[0];
bGrid.querySelectorAll('.ci').forEach(ci=>{const on=(s.baseFx||[]).includes(ci.dataset.fx);ci.querySelector('input').checked=on;ci.classList.toggle('on',on)});rebuildEachSL(bGrid);
if(s.baseSliders)setTimeout(()=>{const sl=$('efbs-'+idx);if(sl)applySlidersInEl(sl,s.baseSliders)},30);
// Hover
const eht=card.querySelector('.ehtog');eht.querySelector('input').checked=s.hovOn!==false;eht.classList.toggle('on',s.hovOn!==false);$('ehpan-'+idx).style.display=s.hovOn!==false?'':'none';
const hGrid=card.querySelectorAll('.efx')[1];
if(hGrid){hGrid.querySelectorAll('.ci').forEach(ci=>{const on=(s.hovFx||[]).includes(ci.dataset.fx);ci.querySelector('input').checked=on;ci.classList.toggle('on',on)});rebuildEachSL(hGrid)}
if(s.hovSliders)setTimeout(()=>{const sl=$('efhs-'+idx);if(sl)applySlidersInEl(sl,s.hovSliders)},30);
if(s.trIn){const el=$('etrin-'+idx);if(el)el.value=s.trIn}
if(s.trOut){const el=$('etrout-'+idx);if(el)el.value=s.trOut}
if(s.scale){const el=$('escale-'+idx);if(el)el.value=s.scale}
if(s.tilt){const el=$('etilt-'+idx);if(el)el.value=s.tilt}
// Anims
if(s.anims&&s.anims.length){const aCg=$('eacg-'+idx);aCg.querySelectorAll('.ci').forEach(ci=>{const on=s.anims.includes(ci.dataset.anim);ci.querySelector('input').checked=on;ci.classList.toggle('on',on)});buildEachAnimSub(idx)}
}
function applySlidersInEl(slEl,data){Object.entries(data).forEach(([fx,d])=>{const row=[...slEl.querySelectorAll('.fr')].find(r=>r.querySelector(`[data-fx="${fx}"]`));if(!row)return;const sl=row.querySelector('[data-fx]');if(sl){sl.value=d.v;sl.nextElementSibling.textContent=d.v+FD[fx].u}if(d.color){const c=row.querySelector('[data-role=color]');if(c)c.value=d.color}if(d.alpha){const a=row.querySelector('[data-role=alpha]');if(a){a.value=d.alpha;row.querySelector('[data-role=alphaval]').textContent=d.alpha+'%'}}})}

function renderPresets(){
const list=getPresets();const el=$('plist');
if(!list.length){el.innerHTML='<span style="font-size:.68rem;color:var(--txf)">없음</span>';return}
el.innerHTML='';list.forEach((p,i)=>{const chip=document.createElement('div');chip.className='preset-chip';chip.innerHTML=`<span class="pname">${p.name}</span><span class="pdel">✕</span>`;chip.querySelector('.pname').onclick=()=>{applySettings(p.settings)};chip.querySelector('.pdel').onclick=e=>{e.stopPropagation();if(confirm('삭제?')){const l=getPresets();l.splice(i,1);saveToLS(l);renderPresets()}};el.appendChild(chip)})}

$('save-btn').onclick=()=>{const name=prompt('프리셋 이름:');if(!name)return;const list=getPresets();list.push({name,settings:collectSettings()});if(saveToLS(list)){renderPresets();alert('저장되었습니다!');if(fxM()==='each')buildEach()}};
$('export-btn').onclick=()=>{const list=getPresets();if(!list.length)return alert('내보낼 프리셋 없음');const blob=new Blob([JSON.stringify(list,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='glkku-presets.json';a.click()};
$('import-btn').onclick=()=>$('imp-file').click();
$('imp-file').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(!Array.isArray(data))throw 0;const list=getPresets();data.forEach(p=>{if(p.name&&p.settings)list.push(p)});saveToLS(list);renderPresets();alert(data.length+'개 가져옴')}catch{alert('올바른 JSON이 아닙니다')}};r.readAsText(f);e.target.value=''};

renderPresets();

// ─── Copy ───
$('copy-btn').onclick=()=>{const code=$('code-out').textContent;const btn=$('copy-btn');function ok(){btn.textContent='✅ 복사 완료!';btn.classList.add('ok');setTimeout(()=>{btn.innerHTML='📋 복사';btn.classList.remove('ok')},2000)}if(navigator.clipboard?.writeText)navigator.clipboard.writeText(code).then(ok).catch(()=>fbC(code,ok));else fbC(code,ok)};
function fbC(t,cb){const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');cb()}catch{alert('Ctrl+C로 복사해주세요')}document.body.removeChild(ta)}

})();
</script>
